<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Precios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .seccion {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .seccion h2 {
            color: #764ba2;
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .resultado {
            background: #e8eaf6;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }

        .coste-total {
            background: #667eea;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            margin: 20px 0;
        }

        .precios-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .precio-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #667eea;
        }

        .precio-box h3 {
            color: #764ba2;
            margin-bottom: 15px;
            font-size: 18px;
            text-align: center;
        }

        .precio-input {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .precio-input input {
            width: 80px;
        }

        .precio-final {
            background: #764ba2;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            margin-top: 10px;
        }

        .calcular-btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .calcular-btn:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Calculadora de Precios</h1>

        <div class="seccion">
            <h2>Datos Iniciales</h2>
            
            <div class="input-group">
                <label for="altura">Altura:</label>
                <input type="number" id="altura" step="0.001" placeholder="Ingrese la altura">
            </div>

            <div class="input-group">
                <label for="ancho">Ancho:</label>
                <input type="number" id="ancho" step="0.001" placeholder="Ingrese el ancho">
            </div>

            <div class="resultado">
                Resultado 1: <span id="resultado1">0.000</span>
            </div>

            <div class="input-group" style="margin-top: 20px;">
                <label for="tiempo">Tiempo:</label>
                <input type="number" id="tiempo" step="0.1" placeholder="Ej: 5.3">
            </div>

            <div class="resultado">
                Resultado 2: <span id="resultado2">0.000</span>
            </div>

            <div class="resultado">
                Resultado 3: <span id="resultado3">0.000</span>
            </div>

            <button class="calcular-btn" onclick="calcular()">Calcular</button>
        </div>

        <div class="coste-total">
            COSTE TOTAL: $<span id="costeTotal">0.000</span>
        </div>

        <div class="seccion">
            <h2>Cálculo de Precios</h2>
            
            <div class="precios-container">
                <div class="precio-box">
                    <h3>Precio al por Mayor</h3>
                    <div class="precio-input">
                        <input type="number" id="porcentajeMayor" value="30" step="1" min="0" max="100" onchange="calcularPrecios()">
                        <span>%</span>
                    </div>
                    <div class="precio-final">
                        $<span id="precioMayor">0.000</span>
                    </div>
                </div>

                <div class="precio-box">
                    <h3>Precio al por Menor</h3>
                    <div class="precio-input">
                        <input type="number" id="porcentajeMenor" value="50" step="1" min="0" max="100" onchange="calcularPrecios()">
                        <span>%</span>
                    </div>
                    <div class="precio-final">
                        $<span id="precioMenor">0.000</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let costeTotal = 0;

        function calcular() {
            // Obtener valores
            const altura = parseFloat(document.getElementById('altura').value) || 0;
            const ancho = parseFloat(document.getElementById('ancho').value) || 0;
            const tiempo = parseFloat(document.getElementById('tiempo').value) || 0;

            // Resultado 1: altura * ancho * 0.76 (costo por cm2)
            const resultado1 = altura * ancho * 0.760;
            document.getElementById('resultado1').textContent = resultado1.toFixed(3);

            // Cálculos para Resultado 2
            const tiempoDividido60 = tiempo / 60.000;
            const multiplicado4000 = tiempoDividido60 * 4000.000;
            const resultado2 = multiplicado4000;
            document.getElementById('resultado2').textContent = resultado2.toFixed(3);

            // Resultado 3
            const calculo1 = (10.000 * tiempoDividido60) / 1000.000;
            const resultado3 = calculo1 * 194.580;
            document.getElementById('resultado3').textContent = resultado3.toFixed(3);

            // Coste Total
            costeTotal = resultado1 + resultado2 + resultado3;
            document.getElementById('costeTotal').textContent = costeTotal.toFixed(3);

            // Calcular precios con porcentajes
            calcularPrecios();
        }

        function calcularPrecios() {
            const porcentajeMayor = parseFloat(document.getElementById('porcentajeMayor').value) || 0;
            const porcentajeMenor = parseFloat(document.getElementById('porcentajeMenor').value) || 0;

            const precioMayor = costeTotal * (1 + porcentajeMayor / 100.000);
            const precioMenor = costeTotal * (1 + porcentajeMenor / 100.000);

            document.getElementById('precioMayor').textContent = precioMayor.toFixed(3);
            document.getElementById('precioMenor').textContent = precioMenor.toFixed(3);
        }

        // Calcular automáticamente cuando se cambian los inputs
        document.getElementById('altura').addEventListener('input', calcular);
        document.getElementById('ancho').addEventListener('input', calcular);
        document.getElementById('tiempo').addEventListener('input', calcular);
    </script>
</body>
</html>
